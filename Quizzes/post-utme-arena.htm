<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Post-UTME Mock Examination — OAE</title>
    
    <!-- Base Styles -->
    <link rel="stylesheet" href="/Assets/css/style.css">
    <link rel="stylesheet" href="/Assets/css/quiz-navbar.css">
    <link rel="stylesheet" href="/Assets/css/footer.css">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- MathJax for Formula Rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']],
                processEscapes: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --green: #0a8a2f;
            --darkgreen: #066426;
            --oae-dark: #0f172a;
            --muted: #64748b;
            --card-border: #e8eaed;
            --card: white;
            --body-bg: #f5f7fa;
        }

        body.dark-mode {
            --oae-dark: #f1f5f9;
            --muted: #94a3b8;
            --card-border: #334155;
            --card: #1e293b;
            --body-bg: #0f1419;
        }

        body {
            background: var(--body-bg);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: var(--oae-dark);
        }

        .quiz-wrap {
            max-width: 1280px;
            margin: 40px auto;
            padding: 20px;
            animation: fadeIn 0.5s ease-out;
            min-height: 80vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === HEADER SECTION === */
        .arena-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card);
            border-radius: 16px;
            padding: 24px 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid var(--card-border);
            margin-bottom: 30px;
            gap: 20px;
            position: relative;
            overflow: hidden;
        }

        .arena-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 10px;
            height: 100%;
            background: linear-gradient(180deg, var(--green), var(--darkgreen));
        }

        .school-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .school-logo {
            width: 65px;
            height: 65px;
            min-width: 65px;
            background: linear-gradient(135deg, var(--green) 0%, var(--darkgreen) 100%);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 8px 16px rgba(10,138,47,0.25);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .school-info h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .school-info p {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(10,138,47,0.05);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(10,138,47,0.2);
        }

        .timer-display {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--green);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .timer-display.warning {
            color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .arena-header {
                flex-direction: column;
                padding: 20px;
            }

            .school-info {
                width: 100%;
            }

            .timer-container {
                width: 100%;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }

            .timer-display {
                font-size: 1.8rem;
            }
        }

        /* === MAIN LAYOUT === */
        .arena-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .arena-layout {
                grid-template-columns: 1fr;
            }
        }

        .main-panel {
            background: var(--card);
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid var(--card-border);
        }

        .side-panel {
            background: var(--card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid var(--card-border);
            position: sticky;
            top: 24px;
            height: fit-content;
        }

        /* === SUBJECT TABS === */
        .subject-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 5px;
        }

        .subject-tabs::-webkit-scrollbar { height: 4px; }
        .subject-tabs::-webkit-scrollbar-track { background: transparent; }
        .subject-tabs::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

        .subject-tab {
            padding: 12px 24px;
            border: 1.5px solid var(--card-border);
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
        }

        .subject-tab:hover {
            border-color: var(--green);
            color: var(--green);
            background: rgba(10,138,47,0.05);
        }

        .subject-tab.active {
            background: var(--green);
            color: white;
            border-color: var(--green);
            box-shadow: 0 4px 12px rgba(10,138,47,0.25);
        }

        /* === QUESTION DISPLAY === */
        .question-header {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px dashed var(--card-border);
        }

        .question-counter {
            font-size: 0.9rem;
            color: var(--green);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            background: rgba(10,138,47,0.1);
            padding: 6px 12px;
            border-radius: 6px;
        }

        .question-text {
            font-size: 1.35rem;
            line-height: 1.7;
            font-weight: 600;
            margin-bottom: 35px;
        }

        /* === OPTIONS === */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .option-item {
            padding: 18px 24px;
            border: 2px solid var(--card-border);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.2s ease;
            background: transparent;
        }

        .option-item:hover {
            border-color: var(--green);
            background: rgba(10,138,47,0.02);
            transform: translateX(5px);
        }

        .option-item.selected {
            background: rgba(10,138,47,0.08);
            border-color: var(--green);
        }

        .opt-letter {
            width: 44px;
            min-width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--body-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: var(--muted);
            transition: all 0.2s ease;
            font-size: 1.05rem;
            border: 1px solid var(--card-border);
        }

        .option-item.selected .opt-letter {
            background: var(--green);
            color: white;
            border-color: var(--green);
            box-shadow: 0 4px 10px rgba(10,138,47,0.3);
        }

        .opt-text {
            font-size: 1.05rem;
            line-height: 1.5;
            font-weight: 500;
        }

        /* === RICH TEXT FORMATTING === */
        /* Instruction lines (e.g. "Read the passage and answer...") */
        .q-instruction {
            display: block;
            font-style: italic;
            color: var(--muted);
            font-size: 0.97rem;
            border-left: 3px solid var(--green);
            padding-left: 10px;
            margin-bottom: 6px;
            font-weight: 400;
        }

        /* Sub/sup in question text and options — keep compact, no line-height disruption */
        .question-text sub,
        .question-text sup,
        .opt-text sub,
        .opt-text sup,
        .explanation-box sub,
        .explanation-box sup {
            font-size: 0.72em;
            line-height: 0;
            position: relative;
            vertical-align: baseline;
        }
        .question-text sup, .opt-text sup, .explanation-box sup { top: -0.5em; }
        .question-text sub, .opt-text sub, .explanation-box sub { bottom: -0.3em; }

        /* Bold/italic/underline in quiz content */
        .question-text strong, .opt-text strong, .explanation-box strong {
            font-weight: 700;
            color: inherit;
        }
        .question-text em, .opt-text em {
            font-style: italic;
            color: inherit;
        }
        .question-text u, .opt-text u {
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        /* === NAVIGATION === */
        .nav-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding-top: 24px;
            border-top: 1px solid var(--card-border);
        }

        .btn-nav {
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            border: 2px solid var(--card-border);
            background: transparent;
            color: var(--oae-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-nav:hover:not(:disabled) {
            border-color: var(--green);
            color: var(--green);
            background: rgba(10,138,47,0.05);
        }

        .btn-nav:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-submit {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--green) 0%, var(--darkgreen) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(10,138,47,0.25);
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 20px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10,138,47,0.35);
        }

        @media (max-width: 640px) {
            .nav-controls {
                flex-direction: column;
                gap: 12px;
            }
            .btn-nav { width: 100%; justify-content: center; }
        }

        /* === PALETTE (SIDE PANEL) === */
        .palette-title {
            margin: 0 0 20px;
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--card-border);
        }

        .palette-title i {
            color: var(--green);
        }

        .review-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .p-btn {
            aspect-ratio: 1;
            border: 2px solid var(--card-border);
            border-radius: 8px;
            background: var(--body-bg);
            color: var(--muted);
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .p-btn:hover {
            border-color: var(--green);
        }

        .p-btn.answered {
            background: var(--green);
            color: white;
            border-color: var(--green);
            box-shadow: 0 2px 8px rgba(10,138,47,0.3);
        }

        .p-btn.current {
            background: #fbbf24;
            border-color: #f59e0b;
            color: #78350f;
            box-shadow: 0 2px 8px rgba(245,158,11,0.3);
        }

        /* === LEGEND === */
        .legend-box {
            background: var(--body-bg);
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid var(--card-border);
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--muted);
        }

        .legend-row:last-child { margin-bottom: 0; }

        .l-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        /* ============================================
           MOBILE RESPONSIVENESS
           ============================================ */

        /* --- Tablet & small laptop (≤1024px) --- */
        @media (max-width: 1024px) {
            .quiz-wrap {
                margin: 20px auto;
                padding: 12px;
            }

            .main-panel {
                padding: 24px 20px;
            }

            .side-panel {
                position: static;
                order: 2;
            }

            .question-text {
                font-size: 1.15rem;
                margin-bottom: 24px;
            }
        }

        /* --- Mobile (≤768px) --- */
        @media (max-width: 768px) {
            .quiz-wrap {
                margin: 10px auto;
                padding: 8px;
            }

            .arena-layout {
                gap: 16px;
            }

            .main-panel {
                padding: 20px 16px;
                border-radius: 12px;
            }

            .side-panel {
                padding: 20px 16px;
                border-radius: 12px;
            }

            .question-text {
                font-size: 1.08rem;
                line-height: 1.65;
                margin-bottom: 20px;
            }

            .q-instruction {
                font-size: 0.88rem;
            }

            /* Options: stack comfortably for thumb taps */
            .option-item {
                padding: 14px 16px;
                gap: 14px;
                border-radius: 10px;
            }

            .option-item:hover {
                transform: none; /* No translateX on mobile — looks wrong */
            }

            .opt-letter {
                width: 38px;
                min-width: 38px;
                height: 38px;
                font-size: 0.95rem;
                border-radius: 8px;
            }

            .opt-text {
                font-size: 0.98rem;
            }

            /* Subject tabs: scrollable row, smaller pills */
            .subject-tabs {
                gap: 8px;
                margin-bottom: 20px;
            }

            .subject-tab {
                padding: 10px 18px;
                font-size: 0.85rem;
            }

            /* Palette grid: 6 columns on phone for more space */
            .review-board {
                grid-template-columns: repeat(6, 1fr);
                gap: 8px;
            }

            .p-btn {
                font-size: 0.85rem;
                border-radius: 6px;
            }

            /* Question counter */
            .question-counter {
                font-size: 0.8rem;
                padding: 5px 10px;
            }

            .question-header {
                margin-bottom: 16px;
                padding-bottom: 12px;
            }

            /* Explanation box on mobile */
            .explanation-box {
                font-size: 0.92rem !important;
                padding: 12px 14px !important;
            }

            /* Nav buttons */
            .btn-outline, .btn-primary, .btn-nav {
                padding: 12px 20px;
                font-size: 0.92rem;
            }

            .btn-submit {
                padding: 12px 24px;
                font-size: 0.95rem;
            }
        }

        /* --- Small phone (≤480px) --- */
        @media (max-width: 480px) {
            .arena-header {
                padding: 14px;
                gap: 12px;
                border-radius: 10px;
            }

            .arena-header::before {
                width: 6px;
            }

            .school-logo {
                width: 48px;
                height: 48px;
                min-width: 48px;
                font-size: 1.4rem;
            }

            .school-info h2 {
                font-size: 1rem;
            }

            .school-info p {
                font-size: 0.78rem;
            }

            .timer-display {
                font-size: 1.5rem;
            }

            .main-panel {
                padding: 16px 12px;
            }

            .question-text {
                font-size: 1rem;
                line-height: 1.6;
                margin-bottom: 16px;
            }

            .option-item {
                padding: 12px 12px;
                gap: 10px;
            }

            .opt-letter {
                width: 34px;
                min-width: 34px;
                height: 34px;
                font-size: 0.88rem;
            }

            .opt-text {
                font-size: 0.9rem;
                line-height: 1.45;
            }

            .review-board {
                grid-template-columns: repeat(7, 1fr);
                gap: 6px;
            }

            .p-btn {
                font-size: 0.78rem;
            }

            .nav-controls {
                padding-top: 16px;
            }

            /* Subject tabs: smaller on tiny screens */
            .subject-tab {
                padding: 8px 14px;
                font-size: 0.8rem;
                border-radius: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- Standard Quiz Navbar from quiz.htm -->
    <nav class="quiz-navbar">
        <div class="quiz-logo">
            <a href="..//">
               <img class="logo-quiz" src="..//oae.png" alt="OAE">
            </a>
        </div>
        <div class="quiz-search-section">
            <div class="quiz-search-container">
                <i class="fas fa-search"></i>
                <input placeholder="Search mock exams...">
                <button class="quiz-search-btn">Search</button>
            </div>
        </div>
        <div class="quiz-nav-container">
            <ul class="quiz-nav-links">
                <li><a href="#">Practice <i class="fas fa-chevron-down"></i></a></li>
                <li><a href="#">Leaderboard <i class="fas fa-chevron-down"></i></a></li>
            </ul>
        </div>
        <button class="quiz-join-btn">Join OAE</button>
        <button class="quiz-hamburger"><i class="fas fa-bars"></i></button>
    </nav>

    <main class="quiz-wrap">
        <!-- Header -->
        <div class="arena-header">
            <div class="school-info">
                <div class="school-logo" id="school-logo"></div>
                <div>
                    <h2 class="school-name" id="school-name">Loading...</h2>
                    <p class="school-desc" id="school-desc"><i class="fas fa-shield-alt"></i> Post-UTME Simulation Engine</p>
                </div>
            </div>
            <div class="timer-container">
                <div class="timer-display" id="timer-display">--:--</div>
                <div style="font-size: 0.8rem; color: var(--muted); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;">Remaining</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="arena-layout">
            <!-- Main Panel -->
            <div class="main-panel">
                <!-- Subject Tabs -->
                <div class="subject-tabs" id="subject-tabs"></div>

                <!-- Question Section -->
                <div class="question-header">
                    <div class="question-counter" id="question-counter">Loading...</div>
                </div>

                <div class="question-text" id="question-text">
                    <div style="display:flex; justify-content:center; padding: 40px;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--green);"></i>
                    </div>
                </div>

                <!-- Options -->
                <div class="options-container" id="options-list"></div>

                <!-- Navigation -->
                <div class="nav-controls">
                    <button class="btn-nav" id="btn-prev">
                        <i class="fas fa-arrow-left"></i> Previous
                    </button>
                    <button class="btn-nav" id="btn-next">
                        Next <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>

            <!-- Side Panel - Review Board -->
            <div class="side-panel">
                <h4 class="palette-title"><i class="fas fa-th-large"></i> Question Navigator</h4>
                
                <div class="review-board" id="review-board"></div>

                <div class="legend-box">
                    <div class="legend-row">
                        <div class="l-color" style="background: var(--green);"></div>
                        <span>Answered</span>
                    </div>
                    <div class="legend-row">
                        <div class="l-color" style="background: var(--body-bg); border: 2px solid var(--card-border);"></div>
                        <span>Unanswered</span>
                    </div>
                    <div class="legend-row">
                        <div class="l-color" style="background: #fbbf24; border: 2px solid #f59e0b;"></div>
                        <span>Current</span>
                    </div>
                </div>

                <button class="btn-submit" id="btn-submit-exam"><i class="fas fa-check-circle"></i> Submit Exam</button>
            </div>
        </div>
    </main>

    <!-- Standard Footer from quiz.htm -->
    <footer class="oae-footer">
        <div class="footer-connect">
            <h3>Connect With Us</h3>
            <hr>
            <div class="socials-bar">
                <a href="https://x.com/oaeofficial123" target="_blank"><i class="ri-twitter-x-fill"></i></a>
                <a href="#"><i class="ri-telegram-fill"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2025 OAE. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="/Assets/js/post-utme-prep.js"></script>
    <script src="/Assets/js/post-utme-engine.js"></script>
</body>
</html>
